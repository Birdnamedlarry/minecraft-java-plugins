# =============================================================================
# SpearUpgradesCow — spear tiers, enchants, and lunge
# =============================================================================
# Edit values below, then restart the server (or use /reload — it reloads
# plugins and may have side effects on other plugins).
#
# -----------------------------------------------------------------------------
# Color codes (same as in-game): prefix with &
#   &0 black   &1 dark blue   &2 dark green   &3 dark aqua   &4 dark red
#   &5 purple  &6 gold        &7 gray         &8 dark gray   &9 blue
#   &a green   &b aqua        &c red           &d pink        &e yellow
#   &f white   &l bold        &m strikethrough &n underline   &o italic
#   &r reset
#
# -----------------------------------------------------------------------------
# Material
#   Native Minecraft spear material for this tier. Supported vanilla options:
#   WOODEN_SPEAR, STONE_SPEAR, COPPER_SPEAR, IRON_SPEAR, GOLDEN_SPEAR,
#   DIAMOND_SPEAR, NETHERITE_SPEAR.
#
# -----------------------------------------------------------------------------
# Lunge
#   Vanilla Minecraft Lunge enchantment applied to the spear item.
#   0 = disabled
#   1 = Lunge I
#   2 = Lunge II
#   3 = Lunge III
#
# -----------------------------------------------------------------------------
# Sharpness
#   Vanilla Sharpness on the spear. 0 = no enchant on the item.
#   In vanilla Minecraft the level is capped at V (5) on the item itself.
#
# -----------------------------------------------------------------------------
# Bonus damage
#   Extra damage added on every hit (in addition to vanilla + Sharpness).
#   Use this to simulate “Sharpness X” when sharpness-on-item is already 5.
#
# -----------------------------------------------------------------------------
# enchant-lore
#   Extra lines shown on the item under the tier line (often used to label
#   Lunge / Sharpness in words). Use [] for none. Each entry is one line; use
#   & color codes as needed.
# =============================================================================

# Lowest and highest spear tier numbers. Players upgrade 1 → max by killing cows.
min-level: 1
max-level: 5

levels:
  1:
    display-name: "&6Basic Wooden Spear"
    flavor: "&7A crude spear carved from wood."
    tier: "Tier 1"
    material: WOODEN_SPEAR
    lunge: 0
    sharpness: 0
    bonus-damage: 0.0
    enchant-lore: []

  2:
    display-name: "&7Stone Spear"
    flavor: "&7A sturdy stone-tipped spear."
    tier: "Tier 2"
    material: STONE_SPEAR
    lunge: 2
    sharpness: 0
    bonus-damage: 0.0
    enchant-lore:
      - "&bLunge II"

  3:
    display-name: "&fIron Spear"
    flavor: "&7A razor-sharp iron spear."
    tier: "Tier 3"
    material: IRON_SPEAR
    lunge: 2
    sharpness: 2
    bonus-damage: 0.0
    enchant-lore:
      - "&bLunge II"
      - "&eSharpness II"

  4:
    display-name: "&bDiamond Spear"
    flavor: "&7A brilliant diamond-forged spear."
    tier: "Tier 4"
    material: DIAMOND_SPEAR
    lunge: 3
    sharpness: 5
    bonus-damage: 0.0
    enchant-lore:
      - "&bLunge III"
      - "&eSharpness V"

  5:
    display-name: "&4Netherite Spear"
    flavor: "&7An unstoppable spear forged in hellfire."
    tier: "Tier 5 (MAX)"
    material: NETHERITE_SPEAR
    lunge: 3
    sharpness: 5
    bonus-damage: 3.0
    enchant-lore:
      - "&bLunge III"
      - "&eSharpness X"
